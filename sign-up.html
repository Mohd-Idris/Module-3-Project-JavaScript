            <input type="text" name="fulltname" id="fullname-input" placeholder="Enter your Full Name" required />
          </div>
          <!--

          <div class="sign-up-form-content">
            <label class="label lbl-email"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 -960 960 960" fill="currentColor">
                <path
                  d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200Zm-320-280v-80 480-400Z" />
              </svg>
            </label>
            <input type="email" name="email" id="email-input" placeholder="Enter your Email " required />
          </div>

          <div class="sign-up-form-content">
            <label class="label lbl-password"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 -960 960 960" fill="currentColor">
                <path
                  d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z" />
              </svg>
            </label>
            <input type="password" name="password" id="password-input" placeholder="Please enter your password "
              required />
          </div>

          <div class="sign-up-form-content">
            <label class="label lbl-confirm-password"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 -960 960 960" fill="currentColor">
                <path
                  d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z" />

            </label>
            <input type="password" name="confirm-password" id="confirm-password-input"
              placeholder="Please confirm your password " required />
          </div>

          <button class="submit btn-sign-up">Sign up</button>
