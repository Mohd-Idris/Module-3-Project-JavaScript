<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My JS Project</title>
    <!-- An external link CSS style  -->
    <link rel="stylesheet" href="style.css" />
    <!-- Fonts -->
    <!-- An external font (Poppins font) for the website -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icons -->
    <!-- A link to generate icons for the website -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navigation Links Section -->
    <header>
      <div class="hearder-container container">
        <div class="logo">
          <a href="#">My<span class="header-span span">JSPro</span></a>
        </div>
        <div class="nav-div">
          <nav class="nav-bar">
            <ul class="nav-links">
              <li><a href="#">Home</a></li>
              <li><a href="#">Services</a></li>
              <li><a href="#">Contact Me</a></li>
              <li><a href="#" class="active-page">Login</a></li>
            </ul>
          </nav>
        </div>
    </header>
    <main>
     
      <section class="login">
        <div class="login-title"><h1 class="title">Login/Sign up </h1></div>
        <div class="login-form-data">
          <form>
                <label class="lbl"
                >Username
                <input
                  type="text"
                  name="name"
                  id="name-input"
                  placeholder="Please enter your username "
                  required
                />

                 <label class="lbl"
                >Password
                <input
                  type="password"
                  name="password"
                  id="password-input"
                  placeholder="Please enter your password "
                  required
                />

            </form>

            <button class="btn" id="btn-login">
              Log In
            </button>

            <button class="btn btn-reset">
              Reset
            </button>

            <a href="#" class="register-text">Register now</a>
        </div>


    </main>
    <script src="script.js"></script>
  </body>
</html>
