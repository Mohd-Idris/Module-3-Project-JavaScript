<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My JS Project</title>
    <!-- An external link CSS style  -->
    <link rel="stylesheet" href="style.css" />
    <!-- Fonts -->
    <!-- An external font (Poppins font) for the website -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icons -->
    <!-- A link to generate icons for the website -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navigation Links Section -->
    <header>
      <div class="hearder-container container">
        <div class="logo">
          <a href="#">My<span class="header-span span">JSPro</span></a>
        </div>
        <div class="nav-div">
          <nav class="nav-bar">
            <ul class="nav-links">
              <li><a href="#">Home</a></li>
              <li><a href="#">Services</a></li>
              <li><a href="#">Contact Me</a></li>
            </ul>
          </nav>
        </div>
    </header>
    <main>
      <!-- ------------------------------------------------------------------------------------ -->
      <div class="home-container">
        <div class="headers">
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search" />
          </div>
          <div class="headers-icons">
            <button class="btn-icon">
              <i class="fas fa-bell"></i>
              <span class="notification-dot"></span>
            </button>
            <button class="btn-icon">
              <i class="fas fa-user"></i>
            </button>
          </div>
        </div>
        <!-- -------------------------------------------------------------------------------- ---->
          <div class="main-content">
        <div class="title-section">
            <div class="greeting" id="greeting">
                <h1>
                    You have <span class="task-count" id="task-count">0</span> task today 
                    <button class="btn-add" onclick="openModal()"><i class="fas fa-plus"></i>Add New</button>
                </h1>
            </div>
        </div>
      </div>
      </div>



     
    </main>
    <script src="script.js"></script>
  </body>
</html>
